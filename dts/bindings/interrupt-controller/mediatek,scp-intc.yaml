description: MediaTek SCP Interrupt Controller

compatible: "mediatek,scp-intc"

include: [interrupt-controller.yaml, base.yaml]

properties:
  reg:
    required: true

  interrupts:
    required: true

  "#interrupt-cells":
    const: 3

interrupt-cells:
  - irq
  - polarity
  - group
